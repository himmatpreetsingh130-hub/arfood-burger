<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Food - Delicious Menu</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- 3D Model Viewer Script -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

    <style>
        :root {
            --primary-color: #ff9f1c; /* Warm Orange */
            --secondary-color: #2ec4b6; /* Fresh Teal */
            --dark-color: #1a1a1a;
            --light-color: #fdfdfd;
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: var(--dark-color);
        }

        /* Header & Nav */
        header {
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
        }

        /* Category Filter */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 2rem 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: var(--shadow);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 5% 5rem 5%;
        }

        .menu-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .menu-card:hover {
            transform: translateY(-10px);
        }

        /* 3D Model Styling */
        .model-container {
            width: 100%;
            height: 250px;
            background: #eee;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        .card-content h3 {
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .card-content p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
            display: block;
            margin-bottom: 15px;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: var(--dark-color);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: var(--primary-color);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">🍔 AR FOOD</a>
        <div class="cart-icon">
            🛒 <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterMenu('all')">All</button>
        <button class="filter-btn" onclick="filterMenu('burger')">Burgers</button>
        <button class="filter-btn" onclick="filterMenu('dessert')">Desserts</button>
        <button class="filter-btn" onclick="filterMenu('drink')">Drinks</button>
    </div>

    <div class="menu-grid" id="menu-grid">
        
        <!-- Burger Item -->
        <div class="menu-card" data-category="burger">
            <div class="model-container">
                <model-viewer src="burger.glb" 
                              alt="3D Burger" 
                              auto-rotate camera-controls 
                              ar ar-modes="webxr scene-viewer quick-look">
                </model-viewer>
            </div>
            <div class="card-content">
                <h3>Premium Beef Burger</h3>
                <p>Juicy beef patty with melted cheddar and fresh lettuce.</p>
                <span class="price-tag">$12.99</span>
                <button class="add-btn" onclick="addToCart()">Add to Cart</button>
            </div>
        </div>

        <!-- Cake Item -->
        <div class="menu-card" data-category="dessert">
            <div class="model-container">
                <model-viewer src="chocolatecake-v9.glb" 
                              alt="3D Cake" 
                              auto-rotate camera-controls 
                              ar ar-modes="webxr scene-viewer quick-look">
                </model-viewer>
            </div>
            <div class="card-content">
                <h3>Choco Lava Cake</h3>
                <p>Warm chocolate cake with a gooey melting center.</p>
                <span class="price-tag">$6.50</span>
                <button class="add-btn" onclick="addToCart()">Add to Cart</button>
            </div>
        </div>

        <!-- Coffee Item -->
        <div class="menu-card" data-category="drink">
            <div class="model-container">
                <model-viewer src="coffee-v1.glb" 
                              alt="3D Coffee" 
                              auto-rotate camera-controls 
                              ar ar-modes="webxr scene-viewer quick-look">
                </model-viewer>
            </div>
            <div class="card-content">
                <h3>Cappuccino</h3>
                <p>Rich espresso topped with a creamy foam layer.</p>
                <span class="price-tag">$4.00</span>
                <button class="add-btn" onclick="addToCart()">Add to Cart</button>
            </div>
        </div>

    </div>

    <script>
        // Cart Logic
        let count = 0;
        function addToCart() {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert("Item added to cart! 🍔");
        }

        // Filtering Logic
        function filterMenu(category) {
            // Update button active state
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Filter Cards
            const cards = document.querySelectorAll('.menu-card');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
