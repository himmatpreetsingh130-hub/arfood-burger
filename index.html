 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARFOOD.STUDIO</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', sans-serif;
    }
    h1 {
      color: #ff6a00;
      font-size: 22px;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-align: center;
    }
    p {
      color: #ffffff60;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 24px;
      text-align: center;
    }
    model-viewer {
      width: 100vw;
      height: 70vh;
      background: transparent;
    }
    .tagline {
      color: #ffffff40;
      font-size: 10px;
      letter-spacing: 3px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>ARFOOD.STUDIO</h1>
  <p>SCAN. WATCH. CRAVE.</p>
  <model-viewer
    src="burger.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
   scale="0.5 0.5 0.5"
    shadow-intensity="1"
    alt="AR Burger Experience">
  </model-viewer>
  <div class="tagline">THE FUTURE OF DINING</div>
</body>
</html>
